<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 DSE 考生三大科學溫習法智能系統 - Miss Tsang</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts 載入 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&family=Patrick+Hand&display=swap" rel="stylesheet">
    <!-- React & ReactDOM UMD 載入 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel Standalone (瀏覽器即時編譯 JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .doodle-font {
            font-family: 'Patrick Hand', 'M PLUS Rounded 1c', sans-serif;
        }
        
        /* 模擬手繪不規則邊框 (Doodle Style Border) */
        .sketch-box {
            border: 3px solid #1e293b;
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            box-shadow: 4px 6px 0px 0px #1e293b;
            transition: all 0.2s ease;
        }

        .sketch-box:hover {
            transform: translate(-1px, -1px);
            box-shadow: 5px 8px 0px 0px #1e293b;
        }

        .sketch-dashed {
            border: 2.5px dashed #475569;
            border-radius: 12px;
        }

        .sketch-input {
            border: none;
            border-bottom: 2px dashed #1e293b;
            background: transparent;
            outline: none;
        }
        .sketch-input:focus {
            border-bottom-style: solid;
            border-bottom-color: #f43f5e;
        }

        /* 默寫區橫格與網格線 background */
        .grid-ruled {
            background-image: 
                linear-gradient(90deg, rgba(30,41,59,0.05) 1px, transparent 1px),
                linear-gradient(rgba(30,41,59,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* 筆記本底線背景 */
        .notebook-lines {
            background-image: linear-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 100% 2.2rem;
            line-height: 2.2rem;
        }

        /* 列印樣式表 (A4 尺寸優化) */
        @media print {
            body {
                background: #ffffff !important;
                color: #000000 !important;
                font-size: 11pt;
            }
            .no-print {
                display: none !important;
            }
            .print-full-width {
                width: 100% !important;
                max-width: 100% !important;
                padding: 0 !important;
                margin: 0 !important;
                box-shadow: none !important;
                border-width: 2px !important;
            }
            /* 強制在列印時解開閃卡虛化 */
            .print-reveal-answer {
                filter: none !important;
                background: transparent !important;
                color: #000000 !important;
            }
        }
    </style>
</head>
<body class="bg-[#FDFBF9] text-slate-800 min-h-screen p-3 md:p-6 selection:bg-rose-100">

    <div id="root"></div>

    <!-- React 核心應用程式 -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- SVG 內建圖示庫 (擺脫 CDN 載入失敗問題) ---
        const Icons = {
            Printer: () => (

            RotateCw: () => (

            ),
            RotateCcw: () => (
                <svg className="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    <polyline points="1 4 1 10 7 10"></polyline>
                    <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
                </svg>
            ),
            Check: () => (
                <svg className="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            ),
            Eye: () => (
                <svg className="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            ),
            EyeOff: () => (
                <svg className="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
            ),
            AlertTriangle: () => (
                <svg className="w-4 h-4 text-amber-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
            ),
            Sparkles: () => (
                <svg className="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m11.314 11.314l.707-.707"></path>
                </svg>
            )
        };

        // --- STREAMING_CHUNK: Initializing main App component and global states... ---
        function App() {
            const [activeTab, setActiveTab] = useState('pomodoro'); // 'pomodoro' | 'activeRecall' | 'spacedRepetition'
            const [showConfirmModal, setShowConfirmModal] = useState(false);
            const [pendingResetTab, setPendingResetTab] = useState(null);

            // --- 全域基本資料共享 ---
            const [studentName, setStudentName] = useState('考生名字');
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [countdown, setCountdown] = useState('100');

            // --- 狀態：番茄工作法專用 ---
            const [focusStars, setFocusStars] = useState(0);
            const [pomodoroTargets, setPomodoroTargets] = useState([
                { id: 1, text: '完成 2020 Math Paper 1 Section A', completed: false },
                { id: 2, text: '溫習 English Writing 常用句型 5 個', completed: false },
                { id: 3, text: '整理 中文科 抒情文寫作素材庫', completed: false },
            ]);
            const [newPomoTarget, setNewPomoTarget] = useState('');
            const [tomatoes, setTomatoes] = useState(
                Array(10).fill(null).map((_, i) => ({ id: i, completed: false }))
            );
            const [pomoSchedule, setPomoSchedule] = useState([
                { id: 1, time: '09:00 - 10:30', subject: '數學科 Section A 操練', review: 'Section A2 部分仍需加強速度' },
                { id: 2, time: '11:00 - 12:30', subject: '英文科 Writing 句型記憶', review: '已掌握 3 個高級連接詞' },
                { id: 3, time: '14:30 - 16:30', subject: '中文科 模擬試卷閱讀理解', review: '白話文答題精準度有進步' },
                { id: 4, time: '17:00 - 18:30', subject: '選修科 核心概念複習', review: '筆記整理完成，明天開始做 Mock' },
            ]);
            const [pomoDistractions, setPomoDistractions] = useState([
                { id: 1, text: '好想看手機的新動態（大休息時再看）', done: false },
            ]);
            const [newDistraction, setNewDistraction] = useState('');

            // --- 計時器狀態 (番茄鐘) ---
            const [timerMode, setTimerMode] = useState('work'); // 'work' or 'break'
            const [pomoTimeLeft, setPomoTimeLeft] = useState(25 * 60);
            const [pomoTimerRunning, setPomoTimerRunning] = useState(false);
            const pomoTimerRef = useRef(null);

            // --- 狀態：主動回想法專用 ---
            const [brainDumpText, setBrainDumpText] = useState('');
            const [activeRecallSubject, setActiveRecallSubject] = useState('例如：中文科文言文 / 物理科電磁學');
            const [mistakes, setMistakes] = useState([
                { id: 1, wrong: '將 DSE 數學科的餘數定理（Remainder Theorem）正負號搞錯，帶入 f(-a) 而非 f(a)。', correct: '當除式為 (x - a) 時，餘數為 f(a)；當除式為 (ax - b) 時，餘數為 f(b/a)。必須先令除式等於 0！' },
                { id: 2, wrong: '文言字詞「走」字，直覺誤譯為「奔跑」以外的現代漢語意思。', correct: '古漢語中「走」解作「跑」，「步」才是慢慢走。要特別注意古今異義。' }
            ]);
            const [newWrongText, setNewWrongText] = useState('');
            const [newCorrectText, setNewCorrectText] = useState('');
            const [flashcards, setFlashcards] = useState([
                { id: 1, question: '什麼是「費曼學習法」的核心精神？', answer: '用最簡單、沒有術語的語言，向一個完全不懂這個領域的人（例如八歲小孩）解釋清楚該概念，以此檢視自己是否真正理解。', mastered: false, showAnswer: false },
                { id: 2, question: '如何區分主動運輸（Active Transport）與被動運輸？', answer: '主動運輸需要消耗能量（ATP），且是逆著濃度梯度進行（低到高）；被動運輸不消耗能量，順著濃度梯度進行。', mastered: false, showAnswer: false }
            ]);
            const [newFlashQuestion, setNewFlashQuestion] = useState('');
            const [newFlashAnswer, setNewFlashAnswer] = useState('');
            const [feynmanList, setFeynmanList] = useState([
                { id: 1, text: '我能完全不用教科書上的專業術語（純粹用生活化比喻）來解釋今天的重點。', checked: false },
                { id: 2, text: '我嘗試向同學、家人或甚至對著鏡子模擬講解，中途沒有任何卡頓或「說不下去」的地方。', checked: false },
                { id: 3, text: '當被追問「為什麼會這樣」時，我能清楚說出背後的根本邏輯，而不是只回答「因為公式是這樣寫的」。', checked: false }
            ]);

            // --- 狀態：間隔重複專用 ---
            const [paperYear, setPaperYear] = useState('例如：2022 Math Paper 1');
            const [paperTimeLimit, setPaperTimeLimit] = useState('120');
            const [paperActualTime, setPaperActualTime] = useState('');
            const [paperScore, setPaperScore] = useState('');
            const [paperTargetScore, setPaperTargetScore] = useState('');
            const [paperNotes, setPaperNotes] = useState('');
            const [srTopics, setSrTopics] = useState([
                { id: 1, topic: '等差與等比數列 (AP / GP) 公式與應用', baseDate: date, d1: false, d3: false, d7: false },
                { id: 2, topic: '文言虛詞「而」、「其」字字義辨析', baseDate: date, d1: false, d3: false, d7: false }
            ]);
            const [newSrTopic, setNewSrTopic] = useState('');
            const [traps, setTraps] = useState([
                { id: 1, text: '極限題中，當 x 趨近於 0 時，忘記檢查分母是否不等於 0。' },
                { id: 2, text: '英文 Writing 忘記轉換 Active / Passive Voice 的主動與被動稱呼，造成語意混亂。' }
            ]);
            const [newTrapText, setNewTrapText] = useState('');
            const [mindsetQuote, setMindsetQuote] = useState('關關難過關關過，今天的努力都會在放榜那天開花結果！🌸');
            const [gratitude, setGratitude] = useState('謝謝戰友今天借我印複習資料，還有媽媽煮的宵夜！');

            // --- 操卷限時模擬計時器狀態 ---
            const [examTimerSec, setExamTimerSec] = useState(120 * 60);
            const [examTimerRunning, setExamTimerRunning] = useState(false);
            const examTimerRef = useRef(null);

            // --- 提示音生成器 (Web Audio API - 無外連資源依賴) ---
            const triggerBeep = (type) => {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    
                    if (type === 'workFinished') {
                        // 叮咚兩聲
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(587.33, ctx.currentTime); // D5
                        gain.gain.setValueAtTime(0.3, ctx.currentTime);
                        osc.start();
                        osc.stop(ctx.currentTime + 0.15);
                        setTimeout(() => {
                            const osc2 = ctx.createOscillator();
                            const gain2 = ctx.createGain();
                            osc2.connect(gain2);
                            gain2.connect(ctx.destination);
                            osc2.type = 'sine';
                            osc2.frequency.setValueAtTime(880, ctx.currentTime); // A5
                            gain2.gain.setValueAtTime(0.3, ctx.currentTime);
                            osc2.start();
                            osc2.stop(ctx.currentTime + 0.3);
                        }, 180);
                    } else if (type === 'breakFinished') {
                        // 單音響起
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(440, ctx.currentTime); // A4
                        gain.gain.setValueAtTime(0.3, ctx.currentTime);
                        osc.start();
                        osc.stop(ctx.currentTime + 0.5);
                    } else {
                        // 考場鐘聲效果
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(330, ctx.currentTime);
                        gain.gain.setValueAtTime(0.2, ctx.currentTime);
                        osc.start();
                        osc.stop(ctx.currentTime + 1);
                    }
                } catch (e) {
                    console.log('音訊功能尚未取得授權。');
                }
            };

            // --- 番茄鐘計時器 Logic ---
            useEffect(() => {
                if (pomoTimerRunning) {
                    pomoTimerRef.current = setInterval(() => {
                        setPomoTimeLeft((prev) => {
                            if (prev <= 1) {
                                clearInterval(pomoTimerRef.current);
                                setPomoTimerRunning(false);
                                if (timerMode === 'work') {
                                    triggerBeep('workFinished');
                                    // 自動將下一個空白番茄填滿
                                    setTomatoes(prevToms => {
                                        const idx = prevToms.findIndex(t => !t.completed);
                                        if (idx !== -1) {
                                            const next = [...prevToms];
                                            next[idx] = { ...next[idx], completed: true };
                                            return next;
                                        }
                                        return prevToms;
                                    });
                                    setTimerMode('break');
                                    return 5 * 60;
                                } else {
                                    triggerBeep('breakFinished');
                                    setTimerMode('work');
                                    return 25 * 60;
                                }
                            }
                            return prev - 1;
                        });
                    }, 1000);
                } else {
                    if (pomoTimerRef.current) clearInterval(pomoTimerRef.current);
                }
                return () => clearInterval(pomoTimerRef.current);
            }, [pomoTimerRunning, timerMode]);

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            };

            // --- 操卷計時器 Logic ---
            useEffect(() => {
                if (examTimerRunning) {
                    examTimerRef.current = setInterval(() => {
                        setExamTimerSec((prev) => {
                            if (prev <= 1) {
                                clearInterval(examTimerRef.current);
                                setExamTimerRunning(false);
                                triggerBeep('examFinished');
                                return 0;
                            }
                            return prev - 1;
                        });
                    }, 1000);
                } else {
                    if (examTimerRef.current) clearInterval(examTimerRef.current);
                }
                return () => clearInterval(examTimerRef.current);
            }, [examTimerRunning]);

            const formatExamTime = (seconds) => {
                const hrs = Math.floor(seconds / 3600);
                const mins = Math.floor((seconds % 3600) / 60);
                const secs = seconds % 60;
                return `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            };

            const calculateFutureDate = (baseDateStr, days) => {
                try {
                    const d = new Date(baseDateStr);
                    if (isNaN(d.getTime())) return '';
                    d.setDate(d.getDate() + days);
                    return `${(d.getMonth() + 1).toString().padStart(2, '0')}/${d.getDate().toString().padStart(2, '0')}`;
                } catch (e) {
                    return '';
                }
            };

            // --- 客製化重設對話框管理 ---
            const requestReset = (tab) => {
                setPendingResetTab(tab);
                setShowConfirmModal(true);
            };

            const confirmReset = () => {
                setShowConfirmModal(false);
                if (pendingResetTab === 'pomodoro') {
                    setFocusStars(0);
                    setPomodoroTargets([]);
                    setTomatoes(Array(10).fill(null).map((_, i) => ({ id: i, completed: false })));
                    setPomoSchedule([
                        { id: 1, time: '時段 1', subject: '', review: '' },
                        { id: 2, time: '時段 2', subject: '', review: '' }
                    ]);
                    setPomoDistractions([]);
                    setPomoTimerRunning(false);
                    setPomoTimeLeft(25 * 60);
                    setTimerMode('work');
                } else if (pendingResetTab === 'activeRecall') {
                    setBrainDumpText('');
                    setMistakes([]);
                    setFlashcards([]);
                    setFeynmanList(feynmanList.map(item => ({ ...item, checked: false })));
                } else if (pendingResetTab === 'spacedRepetition') {
                    setPaperTimeLimit('120');
                    setPaperActualTime('');
                    setPaperScore('');
                    setPaperTargetScore('');
                    setPaperNotes('');
                    setSrTopics([]);
                    setTraps([]);
                    setMindsetQuote('');
                    setGratitude('');
                    setExamTimerRunning(false);
                    setExamTimerSec(120 * 60);
                }
            };

            return (
                <div className="max-w-5xl mx-auto py-2 md:py-6">
                    
                    {/* 頂部不列印之功能選單與分頁切換 */}
                    <div className="no-print mb-8">
                        {/* 系統說明看板 */}
                        <div className="bg-slate-900 text-slate-100 p-4 rounded-2xl mb-6 shadow-md flex flex-col md:flex-row items-center justify-between gap-4 border-2 border-slate-700">
                            <div className="flex items-center gap-3">
                                <span className="bg-rose-500 text-white p-2.5 rounded-full font-black text-xl animate-pulse">DSE</span>
                                <div>
                                    <h4 className="font-extrabold text-base tracking-wide flex items-center gap-1.5">
                                        🚀 DSE 考生三大科學溫習法智能系統
                                    </h4>
                                    <p className="text-xs text-slate-400">
                                        Miss Tsang 專屬設計。線上操作可自動計時與打勾，亦可直接點擊列印成精緻黑白 A4 複習單。
                                    </p>
                                </div>
                            </div>
                            <button 
                                onClick={() => window.print()}
                                className="flex items-center gap-2 px-5 py-2.5 bg-rose-500 hover:bg-rose-600 text-white font-extrabold rounded-xl transition-all shadow active:translate-y-0.5 text-sm"
                            >
                                <Icons.Printer />
                                列印當前溫習計劃表 (A4)
                            </button>
                        </div>

                        {/* 三大溫習法分頁 Tab */}
                        <div className="grid grid-cols-3 gap-2 p-1.5 bg-slate-100 rounded-2xl border border-slate-300">
                            <button

                                                                <span className="text-[9px]">7 天後 ({calculateFutureDate(topic.baseDate, 7)})</span>
                                                                <span className="text-[9px] flex items-center gap-0.5 mt-0.5">
                                                                    {topic.d7 ? '✅ 已重溫' : '▫️ 未重溫'}
                                                                </span>
                                                            </button>
                                                        </div>
                                                    </div>
                                                ))
                                            )}
                                        </div>

                                        <div className="mt-4 p-3 border-t border-slate-100 no-print">
                                            <p className="text-xs font-bold text-slate-700 mb-2">➕ 新增追蹤課題</p>
                                            <div className="flex gap-2">
                                                <input 
                                                    type="text"
                                                    placeholder="例如：數列 AP/GP 難題突破、文言句式..."
                                                    value={newSrTopic}
                                                    onChange={(e) => setNewSrTopic(e.target.value)}
                                                    onKeyDown={(e) => {
                                                        if(e.key === 'Enter' && newSrTopic.trim()) {
                                                            setSrTopics([...srTopics, { id: Date.now(), topic: newSrTopic.trim(), baseDate: date, d1: false, d3: false, d7: false }]);
                                                            setNewSrTopic('');
                                                        }
                                                    }}
                                                    className="flex-grow text-xs sketch-input py-1"
                                                />
                                                <button
                                                    onClick={() => {
                                                        if(newSrTopic.trim()) {
                                                            setSrTopics([...srTopics, { id: Date.now(), topic: newSrTopic.trim(), baseDate: date, d1: false, d3: false, d7: false }]);
                                                            setNewSrTopic('');
                                                        }
                                                    }}
                                                    className="px-3 py-1.5 bg-slate-100 hover:bg-slate-200 border text-slate-700 rounded text-xs font-bold flex items-center justify-center gap-1"
                                                >
                                                    <Icons.Plus />
                                                    加入
                                                </button>
                                            </div>
                                        </div>
                                    </div>

                                    {/* 魔鬼陷阱卡 */}
                                    <div className="p-5 sketch-box bg-white relative">
                                        <div className="absolute -top-3 right-6 bg-white px-2 border-2 border-slate-800 rounded font-bold text-[10px] text-amber-500">
                                            TRAP ALERT
                                        </div>
                                        <h3 className="text-lg font-black text-slate-900 border-b-2 border-slate-800 pb-2 mb-3 flex items-center gap-1.5">
                                            ⚠️ 常犯魔鬼細節 (Trap Log)
                                        </h3>
                                        <p className="text-xs text-slate-500 mb-4">
                                            記錄大考真題中的致命陷阱，或個人慣性粗心點。考前一讀避免扣分！
                                        </p>

                                        <div className="space-y-2.5 min-h-[100px] bg-amber-50/20 p-3 rounded-lg border-2 border-dashed border-amber-300">
                                            {traps.length === 0 ? (
                                                <p className="text-slate-400 text-xs italic text-center py-6">今日無踏入陷阱，持續保持！</p>
                                            ) : (
                                                traps.map(item => (
                                                    <div key={item.id} className="flex items-start justify-between group gap-2">
                                                        <div className="flex items-start gap-1.5">
                                                            <Icons.AlertTriangle />
                                                            <span className="text-xs doodle-font font-bold text-amber-900 leading-relaxed">
                                                                {item.text}
                                                            </span>
                                                        </div>
                                                        <button 
                                                            onClick={() => setTraps(traps.filter(t => t.id !== item.id))}
                                                            className="opacity-0 group-hover:opacity-100 no-print text-slate-400 hover:text-rose-500 p-0.5 shrink-0"
                                                        >
                                                            <Icons.Trash2 />
                                                        </button>
                                                    </div>
                                                ))
                                            )}
                                        </div>

                                        <div className="mt-4 flex gap-2 no-print">
                                            <input 
                                                type="text"
                                                placeholder="例：題目限解正整數，誤代入負分數解..."
                                                value={newTrapText}
                                                onChange={(e) => setNewTrapText(e.target.value)}
                                                onKeyDown={(e) => {
                                                    if(e.key === 'Enter' && newTrapText.trim()){
                                                        setTraps([...traps, { id: Date.now(), text: newTrapText.trim() }]);
                                                        setNewTrapText('');
                                                    }
                                                }}
                                                className="flex-grow sketch-input text-xs px-2 py-1"
                                            />
                                            <button 
                                                onClick={() => {
                                                    if(newTrapText.trim()){
                                                        setTraps([...traps, { id: Date.now(), text: newTrapText.trim() }]);
                                                        setNewTrapText('');
                                                    }
                                                }}
                                                className="p-1.5 border-2 border-slate-800 rounded bg-slate-100 hover:bg-slate-200"
                                            >
                                                <Icons.Plus />
                                            </button>
                                        </div>
                                    </div>

                                </div>
                            </div>
                        )}

                        {/* --- 3. 頁尾設計 (Footer) --- */}
                        <footer className="mt-12 pt-6 border-t-2 border-slate-800 flex flex-col sm:flex-row items-center justify-between gap-4 text-xs text-slate-500 font-bold">
                            <div>
                                {activeTab === 'pomodoro' && <span>💡 每完成 4 個番茄鐘建議安排一次 15-30 分鐘的大休息。</span>}
                                {activeTab === 'activeRecall' && <span>💡 主動提取記憶的過程可能稍顯吃力，但能創造極高質量的長期記憶儲存。</span>}
                                {activeTab === 'spacedRepetition' && <span>💡 錯題本與魔鬼陷阱考前必讀！配合間隔重複以達到複利學習效果。</span>}
                            </div>
                            <div className="text-right doodle-font text-slate-800 text-sm">
                                Designed by <span className="font-bold underline decoration-wavy decoration-rose-500">Miss Tsang</span>
                            </div>
                        </footer>

                    </div>

                    {/* --- 自訂手繪風確認對話盒 (完全代替 confirm) --- */}
                    {showConfirmModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fadeIn no-print">
                            <div className="bg-white max-w-sm w-full p-6 sketch-box text-center">
                                <h4 className="text-lg font-black text-slate-900 doodle-font mb-2">⚠️ 確定清空內容嗎？</h4>
                                <p className="text-xs text-slate-500 leading-relaxed mb-6">
                                    此動作將會抹除今日在此複習分頁中輸入的所有目標、課表及暫存紀錄。確認要清除並重新開始嗎？
                                </p>
                                <div className="flex gap-3 justify-center">
                                    <button
                                        onClick={confirmReset}
                                        className="px-4 py-2 bg-rose-500 hover:bg-rose-600 text-white text-xs font-bold rounded-lg border-2 border-slate-800 shadow"
                                    >
                                        確定清空
                                    </button>
                                    <button
                                        onClick={() => setShowConfirmModal(false)}
                                        className="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-semibold rounded-lg border border-slate-300"
                                    >
                                        取消
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        // --- 啟動 React 渲染 ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

</body>
</html>
